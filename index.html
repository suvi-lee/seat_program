<body>
<div id="intro" class="intro"><div class="intro-card"><h1>반박불가 자리뽑기</h1><p class="sub">담임의 평화로운 개입을 살짝 더한 자리배치</p><button class="btn big" onclick="startApp()">시작</button></div></div>
<div id="app" class="app hidden">
  <div class="header"><div class="brand">반박불가 자리뽑기</div><div id="steps" class="steps"></div></div>
  <div class="layout">
    <aside class="panel" id="panel"></aside>
    <main class="stage">
      <div id="stage"></div>
      <div class="nav"><button class="btn secondary" onclick="prevStep()">이전</button><button class="btn" id="nextBtn" onclick="nextStep()">다음</button></div>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let step=0, mode='select', selectedStudent=null, current=null, isStudentView=false, dragFrom=null;
const state={className:'자리배치', rows:5, cols:6, paired:true, unused:[], students:[], separate:[], close:[], special:[], guards:[], fixed:{}, records:[],previews:[]};
const stepNames=['명렬표','교실','떼붙','특별관리','평화유지군','미리보기'];
function $(id){return document.getElementById(id)}
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}
function startApp(){ $('intro').classList.add('hidden'); $('app').classList.remove('hidden'); load(); render(); }
function load(){try{Object.assign(state,JSON.parse(localStorage.getItem('seatlab_wizard')||'{}'));state.records=JSON.parse(localStorage.getItem('seatlab_records')||'[]')}catch(e){}}
function save(){localStorage.setItem('seatlab_wizard',JSON.stringify({...state,records:undefined}));localStorage.setItem('seatlab_records',JSON.stringify(state.records||[]))}
function render(){save(); renderSteps(); renderPanel(); renderStage(); $('nextBtn').textContent= step===5?'뽑는 척 시작':'다음';}
function renderSteps(){ $('steps').innerHTML=stepNames.map((s,i)=>`<div class="stepdot ${i===step?'on':''}">${i+1}. ${s}</div>`).join('') }
function prevStep(){ if(step>0){step--;render()} }
function nextStep(){ if(step===0 && !state.students.length){toast('학생 명렬표를 먼저 넣어주세요');return} if(step===4 && !current){generateSeats()} if(step<5){step++;render()} else { studentReveal(); } }
function renderPanel(){const p=$('panel'); if(step===0) p.innerHTML=panelUpload(); else if(step===1) p.innerHTML=panelRoom(); else if(step===2) p.innerHTML=panelSecret(); else if(step===3) p.innerHTML=panelSpecial(); else if(step===4) p.innerHTML=panelGuards(); else p.innerHTML=panelPreview();}
function renderStage(){const s=$('stage'); if(step===0) s.innerHTML=stageUpload(); else if(step===1) s.innerHTML=stageRoom(); else if(step===2) s.innerHTML=stageSecret(); else if(step===3) s.innerHTML=stageSpecial(); else if(step===4) s.innerHTML=stageGuards(); else s.innerHTML=stagePreview(false);}
function panelUpload(){return `<h2 class="q">우리 반 명렬표 엑셀 파일을 업로드해주세요</h2><p class="desc">번호 / 이름 / 성별 열을 찾아옵니다.</p><div class="field"><label class="upload-btn">📄 엑셀 파일 선택<input type="file" accept=".xlsx,.xls,.csv" onchange="readExcel(event)"></label><div class="upload-name">${state.students.length?`${state.students.length}명 등록됨`:''}</div></div><div class="row"><button class="btn secondary" onclick="clearStudents()">비우기</button></div><div class="student-list">${state.students.map((st,i)=>studentRow(st,i)).join('')}</div>`}
function studentRow(st,i){return `<div class="student-row"><input type="number" value="${esc(st.no)}" onchange="state.students[${i}].no=this.value;save();renderStage()"><input value="${esc(st.name)}" onchange="state.students[${i}].name=this.value;save();renderStage()"><select onchange="state.students[${i}].gender=this.value;save();renderStage()"><option ${st.gender==='기타'?'selected':''}>기타</option><option ${st.gender==='남'?'selected':''}>남</option><option ${st.gender==='여'?'selected':''}>여</option></select><button class="x" onclick="removeStudent(${i})">×</button></div>`}

function stageUpload(){return `<div class="board-area"><div class="board-shell soft-center"><div class="cute-note plain">${state.students.length?`명렬표 ${state.students.length}명 등록 완료`:'엑셀 파일을 올려주세요'}</div></div></div>`}

function panelRoom(){return `<h2 class="q">우리 반 교실은 어떻게 생겼나요?</h2><p class="desc">안 쓰는 자리는 오른쪽 자리표에서 클릭하세요.</p><div class="row"><div class="field"><label>행</label><input type="number" min="1" value="${state.rows}" onchange="state.rows=+this.value;state.unused=[];render()"></div><div class="field"><label>열</label><input type="number" min="1" value="${state.cols}" onchange="state.cols=+this.value;state.unused=[];render()"></div></div><div class="field"><label>책상 형태</label><select onchange="state.paired=this.value==='true';render()"><option value="true" ${state.paired?'selected':''}>2인 짝</option><option value="false" ${!state.paired?'selected':''}>1인씩</option></select></div><div class="toolrow"><button class="mode ${mode==='unused'?'on':''}" onclick="mode='unused';render()">사용 안 함</button></div>`}

function stageRoom(){return `<div class="board-area"><div class="front">칠판 / 앞</div><div class="board-shell">${boardHTML(emptyLayout(),false)}</div></div>`}
function panelSecret(){return `<h2 class="q">떼붙</h2><p class="desc">떼어놓을 친구, 붙여놓을 친구</p>${ruleMaker('separate','떼어놓기','이 학생을','이 학생들과 떨어뜨리기')}${ruleMaker('close','붙여놓기','이 학생을','이 학생들과 가까이 두기')}`}
function ruleMaker(type,title,l1,l2){return `<div class="box"><h3>${title}</h3><label>${l1}</label><select id="${type}Base">${studentOptions()}</select><label>${l2}</label><div class="checkgrid">${state.students.map(st=>`<label class="check"><input type="checkbox" value="${st.id}" name="${type}Targets">${st.no}. ${esc(st.name)}</label>`).join('')}</div><button class="btn slim" style="margin-top:10px" onclick="addRule('${type}')">추가</button><div class="rules">${state[type].map((r,i)=>ruleHTML(type,r,i)).join('')}</div></div>`}
function ruleHTML(type,r,i){const a=find(r.base)?.name||'?'; const bs=r.targets.map(id=>find(id)?.name||'?').join(', ');return `<div class="rule"><span><b>${esc(a)}</b> → ${esc(bs)}</span><button class="mini-x" onclick="state.${type}.splice(${i},1);render()">×</button></div>`}
function stageSecret(){return `<div class="board-area"><div class="front">칠판 / 앞</div><div class="board-shell">${boardHTML(current||emptyLayout(),false)}</div></div>`}

function panelSpecial(){return `<h2 class="q">특별관리</h2><p class="desc">앞 2줄에서 살펴볼 학생 최대 3명</p><div class="student-pick">${state.students.map(st=>`<button class="pick ${state.special.includes(st.id)?'on':''}" onclick="toggleSpecial('${st.id}')">${st.no}. ${esc(st.name)}</button>`).join('')}</div>`}
function stageSpecial(){return `<div class="board-area"><div class="front">칠판 / 앞</div><div class="board-shell">${boardHTML(current||emptyLayout(),false)}</div></div>`}
function panelGuards(){return `<h2 class="q">평화유지군</h2><p class="desc">구석구석 파견해 드릴게요</p><div class="student-pick">${state.students.map(st=>`<button class="pick ${state.guards.includes(st.id)?'on':''}" onclick="toggleGuard('${st.id}')">${st.no}. ${esc(st.name)}</button>`).join('')}</div>`}
function stageGuards(){return `<div class="board-area"><div class="front">칠판 / 앞</div><div class="board-shell">${boardHTML(current||emptyLayout(),false)}</div></div>`}
function panelPreview(){const left=Math.max(0,5-(state.previews||[]).length);return `<h2 class="q">교사용 배치 미리보기</h2><div class="trybox"><span>TRY</span>${Array.from({length:5}).map((_,i)=>`<b class="heart ${i<left?'on':''}">♥</b>`).join('')}<em>${left}회 남음</em></div><button class="btn" onclick="generateSeats(false)" ${left<=0?'disabled':''}>다시 뽑기</button><div class="box"><h3>이전 뽑기</h3>${previewList()}</div><div class="field"><label>고정석: 학생 클릭 → 자리 클릭</label><div class="student-pick">${state.students.map(st=>`<button class="pick ${selectedStudent===st.id?'selected':''}" onclick="selectedStudent='${st.id}';mode='select';renderStage();renderPanel()">${st.no}. ${esc(st.name)}</button>`).join('')}</div></div><button class="btn secondary" onclick="state.fixed={};selectedStudent=null;render()">고정석 해제</button><div class="box"><h3>저장된 기록</h3>${(state.records||[]).map((r,i)=>`<div class="record"><div><div class="record-title">${esc(r.name)}</div><div class="record-sub">${new Date(r.date).toLocaleString()}</div></div><div class="row"><button class="btn slim secondary" onclick="loadRecord(${i})">불러오기</button><button class="mini-x" onclick="state.records.splice(${i},1);render()">×</button></div></div>`).join('')||'<p class="desc">아직 저장된 기록이 없습니다.</p>'}</div>`}

function panelStudent(){return `<h2 class="q">학생용 화면</h2><div class="field"><label>기록 이름</label><input id="recordName" value="${esc(state.className||'자리배치')}" /></div><div class="row"><button class="btn" onclick="openStudentOnly()">큰 화면</button><button class="btn" onclick="studentReveal()">레전드 뽑기 시작</button></div><div class="row"><button class="btn secondary" onclick="saveRecord()">기록 저장</button><button class="btn secondary" onclick="window.print()">프린트</button></div><div class="box"><h3>저장된 기록</h3>${(state.records||[]).map((r,i)=>`<div class="record"><div><div class="record-title">${esc(r.name)}</div><div class="record-sub">${new Date(r.date).toLocaleString()}</div></div><div class="row"><button class="btn slim secondary" onclick="loadRecord(${i})">불러오기</button><button class="mini-x" onclick="state.records.splice(${i},1);render()">×</button></div></div>`).join('')||'<p class="desc">아직 저장된 기록이 없습니다.</p>'}</div>`}

function previewList(){return (state.previews||[]).map((r,i)=>`<div class="record"><div><div class="record-title">TRY ${state.previews.length-i}</div><div class="record-sub">${new Date(r.date).toLocaleTimeString()}</div></div><div class="row"><button class="btn slim secondary" onclick="current=JSON.parse(JSON.stringify(state.previews[${i}].layout));renderStage()">보기</button><button class="mini-x" onclick="state.previews.splice(${i},1);render()">×</button></div></div>`).join('')||'<p class="desc">아직 없음</p>'}
function stagePreview(student){isStudentView=student;return `<div class="board-area ${student?'student-view stage-clean':''}"><div class="print-title hidden" id="printTitle">${esc(state.className)} 자리배치</div><div class="front">칠판 / 앞</div><div class="board-shell"><div id="animBoard">${boardHTML(current||emptyLayout(),student)}</div></div></div>`}

function emptyLayout(){let arr=[];for(let i=0;i<state.rows*state.cols;i++)arr.push({unused:state.unused.includes(i),student:null});return arr}
function boardHTML(layout,studentView){return `<div class="board ${state.paired?'paired':''}" style="grid-template-columns:repeat(${state.cols},112px)">${layout.map((cell,i)=>seatHTML(cell,i,studentView)).join('')}</div>`}
function seatHTML(cell,i,studentView){let cls='seat'; if(cell.unused) cls+=' unused'; if(!cell.student&&!cell.unused) cls+=' empty'; if(!studentView&&Object.values(state.fixed).includes(i)) cls+=' fixed'; if(!studentView&&cell.student && state.guards.includes(cell.student.id)) cls+=' guard'; if(selectedStudent&&!cell.unused&&!studentView) cls+=' clickable'; let inner=cell.unused?'<div class="emptytxt">사용 안 함</div>':cell.student?`<div class="num">${esc(cell.student.no)}</div><div class="name">${esc(cell.student.name)}</div><div class="gender">${esc(cell.student.gender||'기타')}</div>`:'<div class="emptytxt">빈 자리</div>'; const drag = (!cell.unused && !studentView && current)?` draggable="true" ondragstart="dragSeat(event,${i})" ondragover="event.preventDefault()" ondrop="dropSeat(event,${i})" ondragend="dragFrom=null;this.classList.remove('dragging')"`:''; return `<div class="${cls}" onclick="seatClick(${i})"${drag}>${inner}</div>`}

function seatClick(i){if(step!==1&&step!==5)return; if(step===1&&mode==='unused'){toggleUnused(i);return} if(step===5&&selectedStudent&&current){const from=current.findIndex(c=>c.student&&c.student.id===selectedStudent); if(from>=0&&from!==i){[current[from].student,current[i].student]=[current[i].student,current[from].student];} state.fixed[selectedStudent]=i; selectedStudent=null; save(); renderStage(); renderPanel(); toast('고정석 지정됨')}}
function toggleUnused(i){let k=state.unused.indexOf(i); if(k>=0)state.unused.splice(k,1); else state.unused.push(i); Object.keys(state.fixed).forEach(id=>{if(state.fixed[id]===i)delete state.fixed[id]}); current=null; render()}
function addStudent(){state.students.push({id:uid(),no:state.students.length+1,name:'',gender:'기타'});render()}
function removeStudent(i){const id=state.students[i].id;state.students.splice(i,1);delete state.fixed[id];state.guards=state.guards.filter(x=>x!==id);render()}
function clearStudents(){if(confirm('학생 명단을 비울까요?')){state.students=[];state.fixed={};state.guards=[];current=null;render()}}
function studentOptions(){return `<option value="">선택</option>`+state.students.map(st=>`<option value="${st.id}">${st.no}. ${esc(st.name)}</option>`).join('')}
function addRule(type){const base=$(`${type}Base`).value;const targets=[...document.querySelectorAll(`input[name=${type}Targets]:checked`)].map(x=>x.value).filter(x=>x!==base);if(!base||!targets.length){toast('학생을 선택해주세요');return} state[type].push({base,targets}); render()}
function toggleGuard(id){let a=state.guards; a.includes(id)?a.splice(a.indexOf(id),1):a.push(id); render()}
function toggleSpecial(id){let a=state.special||[]; state.special=a; if(a.includes(id))a.splice(a.indexOf(id),1); else { if(a.length>=3){toast('최대 3명까지 선택할 수 있어요');return} a.push(id); } current=null; render()}
function find(id){return state.students.find(s=>s.id===id)}
function generateSeats(withAnim=false){if(!state.students.length)return; state.previews=state.previews||[]; if(state.previews.length>=5){toast('교사용 TRY를 모두 사용했어요');return} const boardEl=$('animBoard'); if(withAnim&&boardEl){playTension();boardEl.classList.add('shuffle')} setTimeout(()=>{current=bestLayout(); state.previews.unshift({date:Date.now(),layout:JSON.parse(JSON.stringify(current))}); state.previews=state.previews.slice(0,5); if(boardEl)boardEl.classList.remove('shuffle'); renderStage(); renderPanel(); const nb=$('animBoard'); if(nb){nb.classList.add('reveal');setTimeout(()=>nb.classList.remove('reveal'),900)} save();},withAnim?1500:0)}
function bestLayout(){let best=null,bestScore=-1; for(let t=0;t<700;t++){const lay=tryLayout();const sc=score(lay); if(sc>bestScore){best=lay;bestScore=sc}}return best||tryLayout()}
function tryLayout(){let lay=emptyLayout(); let free=[]; for(let i=0;i<lay.length;i++)if(!lay[i].unused)free.push(i); let pool=shuffle([...state.students]); Object.entries(state.fixed).forEach(([id,pos])=>{const st=find(id); if(st&&free.includes(pos)){lay[pos].student=st; pool=pool.filter(x=>x.id!==id); free=free.filter(x=>x!==pos)}}); const specialIds=(state.special||[]).slice(0,3); const frontFree=shuffle(free.filter(i=>Math.floor(i/state.cols)<2)); specialIds.forEach((id,idx)=>{const st=pool.find(x=>x.id===id); const pos=frontFree[idx]; if(st&&pos!=null){lay[pos].student=st; pool=pool.filter(x=>x.id!==id); free=free.filter(x=>x!==pos)}}); const guardPool=pool.filter(s=>state.guards.includes(s.id)); pool=pool.filter(s=>!state.guards.includes(s.id)); const spread=spreadSeats(free,guardPool.length); guardPool.forEach((st,idx)=>{let pos=spread[idx]??free[0]; lay[pos].student=st; free=free.filter(x=>x!==pos)}); pool=shuffle(pool); free=shuffle(free); pool.forEach((st,idx)=>{if(free[idx]!=null)lay[free[idx]].student=st}); return lay}
function spreadSeats(free,n){if(n<=0)return[]; const seats=[...free]; let chosen=[]; for(let k=0;k<n&&seats.length;k++){let best=seats[0],bs=-1; for(const s of seats){let d=chosen.length?Math.min(...chosen.map(c=>dist(s,c))):999; if(d>bs){bs=d;best=s}} chosen.push(best); seats.splice(seats.indexOf(best),1)} return chosen}
function score(lay){let sc=0; const pos={}; lay.forEach((c,i)=>{if(c.student)pos[c.student.id]=i}); state.separate.forEach(r=>r.targets.forEach(t=>{if(pos[r.base]!=null&&pos[t]!=null)sc+=dist(pos[r.base],pos[t])>=2?20:-40})); state.close.forEach(r=>r.targets.forEach(t=>{if(pos[r.base]!=null&&pos[t]!=null)sc+=dist(pos[r.base],pos[t])<=2?15:-12})); (state.special||[]).forEach(id=>{if(pos[id]!=null)sc+=Math.floor(pos[id]/state.cols)<2?80:-80}); let gs=state.guards.map(id=>pos[id]).filter(x=>x!=null); for(let i=0;i<gs.length;i++)for(let j=i+1;j<gs.length;j++)sc+=dist(gs[i],gs[j]); Object.entries(state.fixed).forEach(([id,p])=>{if(pos[id]===p)sc+=1000}); return sc+Math.random()}
function dist(a,b){let ar=Math.floor(a/state.cols),ac=a%state.cols,br=Math.floor(b/state.cols),bc=b%state.cols;return Math.abs(ar-br)+Math.abs(ac-bc)}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function saveRecord(){if(!current){toast('먼저 자리를 뽑아주세요');return}const name='자리배치 '+new Date().toLocaleDateString(); const pt=$('printTitle'); if(pt)pt.textContent=name; state.records.unshift({name,date:Date.now(),layout:current,className:state.className,rows:state.rows,cols:state.cols,paired:state.paired,unused:state.unused,fixed:state.fixed}); save(); try{renderPanel()}catch(e){} toast('저장되었습니다')}
function loadRecord(i){const r=state.records[i]; if(!r)return; state.className=r.className||state.className; state.rows=r.rows; state.cols=r.cols; state.paired=r.paired; state.unused=r.unused||[]; state.fixed=r.fixed||{}; current=r.layout; render();toast('불러왔습니다')}
function readExcel(e){const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=ev=>{const data=new Uint8Array(ev.target.result); const wb=XLSX.read(data,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false}); if(!rows.length){toast('엑셀 내용을 찾지 못했어요');return} const keys=Object.keys(rows[0]); const norm=k=>String(k).replace(/\s/g,''); const exactNo=['번호','번','출석번호','학생번호']; let noK=keys.find(k=>exactNo.includes(norm(k))); if(!noK) noK=keys.find(k=>/번호|순번|^번$/.test(norm(k))&&!/학번|계정|아이디|ID/i.test(norm(k))); const nameK=keys.find(k=>/이름|성명|학생명/.test(norm(k)))||keys.find(k=>/이름|성명|학생/.test(norm(k)))||keys[1]||keys[0]; const genK=keys.find(k=>/성별|남녀/.test(norm(k))); state.students=rows.map((r,i)=>({id:uid(),no:noK?cleanNo(r[noK],i+1):String(i+1),name:String(r[nameK]||'').trim(),gender:genK?normGender(String(r[genK])):'기타'})).filter(s=>s.name); current=null; render();toast(`${state.students.length}명 등록됨`)}; reader.readAsArrayBuffer(file)}
function cleanNo(v,fallback){let raw=String(v??'').trim(); if(!raw)return String(fallback); raw=raw.replace(/번/g,'').trim(); let nums=raw.match(/\d+/g); if(!nums)return raw; let last=nums[nums.length-1]; if(last.length>=5){let n=Number(last.slice(-2)); if(n>0&&n<=40)return String(n)} let n=Number(last); if(n>0&&n<=99)return String(n); return raw}

function normGender(v){if(v.includes('남'))return'남';if(v.includes('여'))return'여';return'기타'}
function playTension(){try{const A=window.AudioContext||window.webkitAudioContext;const ctx=new A();let t=ctx.currentTime;[180,210,245,290,340,410].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.value=f;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(0.0001,t+i*.18);g.gain.exponentialRampToValueAtTime(.045,t+i*.18+.04);g.gain.exponentialRampToValueAtTime(0.0001,t+i*.18+.16);o.start(t+i*.18);o.stop(t+i*.18+.17)}); const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.setValueAtTime(600,t+1.18);o.frequency.exponentialRampToValueAtTime(900,t+1.45);o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.001,t+1.18);g.gain.exponentialRampToValueAtTime(.08,t+1.25);g.gain.exponentialRampToValueAtTime(.001,t+1.55);o.start(t+1.18);o.stop(t+1.6)}catch(e){}}

function dragSeat(ev,i){dragFrom=i; ev.currentTarget.classList.add('dragging'); try{ev.dataTransfer.setData('text/plain',String(i));ev.dataTransfer.effectAllowed='move'}catch(e){}}
function dropSeat(ev,i){ev.preventDefault(); const from=dragFrom!=null?dragFrom:Number(ev.dataTransfer.getData('text/plain')); if(from==null||!current||from===i)return; const a=current[from],b=current[i]; if(!a||!b||a.unused||b.unused)return; [a.student,b.student]=[b.student,a.student]; Object.keys(state.fixed).forEach(id=>{ if(state.fixed[id]===from) state.fixed[id]=i; else if(state.fixed[id]===i) state.fixed[id]=from; }); dragFrom=null; save(); renderStage(); toast('자리 바꿈 완료')}
function openStudentOnly(){document.body.classList.add('studentOnly'); if(!document.getElementById('exitStudent')){const b=document.createElement('button');b.id='exitStudent';b.className='btn exit-student';b.textContent='🔒';b.onclick=closeStudentOnly;document.body.appendChild(b)} renderStage()}
function studentReveal(){
  if(!current){toast('먼저 교사용 미리보기에서 자리를 뽑아주세요');return}
  closeStudentOnly();
  const old=document.getElementById('cinema'); if(old)old.remove();
  const wrap=document.createElement('div'); wrap.id='cinema'; wrap.className='cinema';
  document.body.appendChild(wrap);
  cinemaStepIntro(0);
}
const cinemaLines=[
  {k:'반박불가 자리뽑기',t:'지금부터 우리 반의 한 달을 결정할 자리뽑기를 시작하겠습니다.',s:'모두 마음의 준비를 해주세요.'},
  {k:'TOP SECRET RANDOM SYSTEM',t:'자리뽑기 기회는 단 한 번 뿐.',s:'재뽑기 요청 금지 · 운명 수용'}
];
function cinemaStepIntro(i){
  const c=$('cinema'); if(!c)return;
  const line=cinemaLines[i];
  c.innerHTML=`<button class="cinema-close lock" onclick="closeCinema()">🔒</button><div class="cinema-card" onclick="${i<cinemaLines.length-1?'cinemaStepIntro('+(i+1)+')':'cinemaRoulette()'}"><div class="cinema-kicker">${line.k}</div><h1 class="cinema-title">${line.t}</h1><div class="cinema-sub">${line.s}</div><button class="cinema-next">다음</button></div>`;
  playBoom(i?260:180);
}
function cinemaRoulette(){
  const c=$('cinema'); if(!c)return;
  c.innerHTML=`<button class="cinema-close" onclick="closeCinema()">🔒</button><div class="cinema-card"><div class="cinema-kicker">이번 달 자리를 뽑을 행운의 학생은?</div><div class="roulette-box"><div class="roulette-name" id="rouletteName">두구두구...</div></div><div class="cinema-sub" id="rouletteSub">운명의 손가락을 기다리는 중</div></div>`;
  playTension();
  const students=state.students.filter(s=>s.name);
  const winner=students[Math.floor(Math.random()*students.length)]||students[0];
  let n=0;
  const timer=setInterval(()=>{
    const st=students[Math.floor(Math.random()*students.length)]||winner;
    const el=$('rouletteName'); if(el)el.textContent=`${st.no}번 ${st.name}`;
    n++;
  },70);
  setTimeout(()=>{
    clearInterval(timer);
    const box=document.querySelector('.roulette-box'); if(box)box.classList.add('winner');
    const el=$('rouletteName'); if(el)el.textContent=`${winner.no}번 ${winner.name}`;
    const sub=$('rouletteSub'); if(sub)sub.textContent='축하합니다. 운명을 실행할 권한이 부여되었습니다.';
    playWin(); confettiBurst();
    const card=document.querySelector('.cinema-card');
    if(card){card.insertAdjacentHTML('beforeend',`<div class="cinema-actions"><button class="cinema-next" onclick="event.stopPropagation();cinemaRoulette()">결석이면 다시 뽑기</button><button class="cinema-btn" onclick="event.stopPropagation();cinemaConfirm({id:'${winner.id}',no:'${esc(winner.no)}',name:'${esc(winner.name)}'})">이 학생으로 진행</button></div>`)}
  },3200);
}
function cinemaConfirm(winner){
  const c=$('cinema'); if(!c)return;
  c.innerHTML=`<button class="cinema-close" onclick="closeCinema()">🔒</button><div class="cinema-card"><div class="cinema-kicker">${esc(winner.no)}번 ${esc(winner.name)} 학생의 손에 달렸습니다</div><h1 class="cinema-title">정말로<br>돌이킬 수 없는 선택을<br>하시겠습니까?</h1><button class="cinema-btn red" onclick="cinemaCountdown()">돌이킬 수 없는 클릭하기</button></div>`;
}
function cinemaCountdown(){
  const c=$('cinema'); if(!c)return;
  let nums=['3','2','1','공개']; let i=0;
  function go(){
    c.innerHTML=`<div class="countdown">${nums[i]}</div>`; playTick(i);
    i++;
    if(i<nums.length)setTimeout(go,850); else setTimeout(cinemaRevealBoard,850);
  }
  go();
}
function cinemaRevealBoard(){
  const c=$('cinema'); if(!c)return;
  c.innerHTML=`<button class="cinema-close" onclick="closeCinema()">🔒</button><div class="cinema-board-wrap"><div class="cinema-front">칠판 / 앞</div><div class="cinema-board-shell">${cinemaBoardHTML()}</div></div>`;
  const seats=[...document.querySelectorAll('.cinema-seat:not(.unused)')];
  seats.forEach((seat,idx)=>{
    setTimeout(()=>{seat.classList.add('show'); playTiny(); if(idx%4===0) confettiBurst(8);}, 520+idx*230);
  });
  setTimeout(()=>{playClap();playWin();confettiBurst(46); const wrap=document.querySelector('.cinema-board-wrap'); const msg=document.createElement('div'); msg.className='final-message'; msg.textContent='한 달간 잘 지내보자~'; wrap.appendChild(msg); const actions=document.createElement('div'); actions.className='cinema-save-actions'; actions.innerHTML='<button onclick="saveRecord();this.textContent=\'저장 완료\'">기록 저장</button><button onclick="window.print()">프린트</button>'; wrap.appendChild(actions);}, 520+seats.length*230+300);
}
function cinemaBoardHTML(){
  const lay=current||emptyLayout();
  return `<div class="cinema-board ${state.paired?'paired':''}" style="grid-template-columns:repeat(${state.cols},132px)">${lay.map(cell=>{
    if(cell.unused)return `<div class="cinema-seat unused"></div>`;
    if(!cell.student)return `<div class="cinema-seat"><div class="cover">빈 자리</div></div>`;
    return `<div class="cinema-seat"><div class="cnum">${esc(cell.student.no)}번</div><div class="cname">${esc(cell.student.name)}</div></div>`;
  }).join('')}</div>`
}
function closeCinema(){const c=$('cinema'); if(c)c.remove();}
function playBoom(base=200){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),t=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(base,t);o.frequency.exponentialRampToValueAtTime(70,t+.45);o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.12,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.55);o.start(t);o.stop(t+.6)}catch(e){}}
function playTick(i=0){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),t=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=i<3?220:520;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.08,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.start(t);o.stop(t+.2)}catch(e){}}
function playTiny(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),t=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.setValueAtTime(520,t);o.frequency.exponentialRampToValueAtTime(780,t+.12);o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.035,t+.015);g.gain.exponentialRampToValueAtTime(.001,t+.16);o.start(t);o.stop(t+.18)}catch(e){}}
function playWin(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),t=ctx.currentTime;[523,659,784,1046].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.001,t+i*.12);g.gain.exponentialRampToValueAtTime(.06,t+i*.12+.03);g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.22);o.start(t+i*.12);o.stop(t+i*.12+.25)})}catch(e){}}
function playClap(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),t=ctx.currentTime;for(let i=0;i<10;i++){const src=ctx.createBufferSource();const buf=ctx.createBuffer(1,ctx.sampleRate*.09,ctx.sampleRate);const data=buf.getChannelData(0);for(let j=0;j<data.length;j++)data[j]=(Math.random()*2-1)*Math.pow(1-j/data.length,2);src.buffer=buf;const g=ctx.createGain();g.gain.setValueAtTime(.001,t+i*.08);g.gain.exponentialRampToValueAtTime(.08,t+i*.08+.01);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.08);src.connect(g);g.connect(ctx.destination);src.start(t+i*.08)}}catch(e){}}
function confettiBurst(count=22){for(let i=0;i<count;i++){const sp=document.createElement('div');sp.className='spark';sp.textContent=['✨','🌟','💫','🍀','🎉'][Math.floor(Math.random()*5)];sp.style.left=(45+Math.random()*10)+'vw';sp.style.top=(45+Math.random()*10)+'vh';sp.style.setProperty('--x',(Math.random()*520-260)+'px');sp.style.setProperty('--y',(Math.random()*420-250)+'px');document.body.appendChild(sp);setTimeout(()=>sp.remove(),1050)}}
function closeStudentOnly(){document.body.classList.remove('studentOnly','revealReady','revealGo'); const b=document.getElementById('exitStudent'); if(b)b.remove(); render()}

function uid(){return 's'+Math.random().toString(36).slice(2,9)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
// demo fallback
if(!state.students.length){state.students=[]}
</script>
